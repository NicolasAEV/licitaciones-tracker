services:
  postgres:
    image: postgres:16-alpine
    container_name: licitaciones-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-licitaciones_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-licitaciones_password}
      POSTGRES_DB: ${POSTGRES_DB:-licitaciones_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - licitaciones-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-licitaciones_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  licitaciones-network:
    driver: bridge
